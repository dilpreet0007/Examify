<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glowA" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#22c55e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="75%" cy="70%" r="65%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#94a3b8" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>

  <g opacity="0.55">
    <circle cx="250" cy="190" r="3" fill="#e2e8f0" opacity="0.55"/>
    <circle cx="420" cy="360" r="2" fill="#e2e8f0" opacity="0.35"/>
    <circle cx="610" cy="140" r="2.5" fill="#e2e8f0" opacity="0.4"/>
    <circle cx="980" cy="250" r="2" fill="#e2e8f0" opacity="0.28"/>
    <circle cx="1290" cy="180" r="3" fill="#e2e8f0" opacity="0.38"/>
    <circle cx="1560" cy="420" r="2" fill="#e2e8f0" opacity="0.25"/>
    <circle cx="1700" cy="720" r="3" fill="#e2e8f0" opacity="0.32"/>
    <circle cx="1180" cy="860" r="2.5" fill="#e2e8f0" opacity="0.22"/>
    <circle cx="760" cy="760" r="2" fill="#e2e8f0" opacity="0.2"/>
  </g>
